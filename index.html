<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caradapio</title>
</head>
<body>
    <form method="get"> 
    <h2><u style="color: midnightblue;">Cardapio:</u></h2> <br>
    <h3>Escolha a sua pizza:</h3>
    <input type="checkbox" name="Escolha Sua pizza[]" value="Calabresa"> + Calabresa  <br>
    <input type="checkbox" name="Escolha Sua pizza[]" value="Quatro Queijos"> + Quatro queijos  <br>
    <input type="checkbox" name="Escolha Sua pizza[]" value="A moda"> + A moda  <br>
    <h3>Você selecionou pizza de calabresa:</h3>
    <h3>Quais Adcionais você deseja?:</h3>
    <input type="checkbox" name="opcoes[]" value="Chedar"> + Chedar  <br>
    <input type="checkbox" name="opcoes[]" value="Milho"> + Milho  <br>
    <input type="checkbox" name="opcoes[]" value="Bacon"> + Bacon  <br>
    <input type="checkbox" name="opcoes[]" value="Cebola"> + Cebola  <br>
    <h3>Borda Recheada?</h3>
    <input type="radio" name="Borda Reachada" value="Sim"> + Sim? <br>
    <input type="radio" name="Borda Reachada" value="Não"> + Não? <br>
    <h3>Bebida?</h3>
    <input type="radio" name="Refrigerante" value="Refrigerante"> Refrigerante <br>
    <input type="radio" name="Suco" value="Suco">Suco<br> 
    <input type="radio" name="Cerveja" value="Cerveja">Cerveja<br>
    <input type="radio" name="Caldo de Cana" value="Caldo de Cana">Caldo de cana<br>
     <button type="submit">Eviar Pedido</button>
    </form>
   
    
</body>
</html>
